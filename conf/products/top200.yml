# Top 200 Home Goods & Grocery Products — Reference Catalog
#
# base_unit: the canonical unit used for unit-price comparison.
#   All pack sizes are normalized to this before computing $/unit.
#   See src/storage/unit_normalizer.py for conversion rules.
#
# Common base_unit values:
#   roll    — paper products
#   sheet   — paper towels, dryer sheets
#   count   — discrete items (pills, pods, bags, wipes)
#   load    — detergent
#   oz      — weight-sold items (meat, cheese, nuts, dry goods)
#   fl oz   — liquid items (beverages, cleaners, oils)
#   lb      — items conventionally priced per pound (produce, coffee)
#   sqft    — foil, wrap, parchment
# ─────────────────────────────────────────────────────────────────────────────

